<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">template</span>&lt;<span class="keyword">class</span> <span class="title class_">T</span>&gt;</span><br><span class="line"><span class="keyword">class</span> <span class="title class_">ListNode</span>&#123;</span><br><span class="line"><span class="keyword">public</span>:</span><br><span class="line">  T value&#123;&#125;;</span><br><span class="line">  ListNode* next = <span class="literal">nullptr</span>;  <span class="comment">// 默认赋空值，避免野指针</span></span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="keyword">template</span>&lt;<span class="keyword">class</span> <span class="title class_">T</span>&gt;</span><br><span class="line"><span class="keyword">class</span> <span class="title class_">List</span>&#123;</span><br><span class="line"><span class="keyword">public</span>:</span><br><span class="line">    ListNode&lt;T&gt;* head;</span><br><span class="line">    <span class="comment">// 寻找链表第一个最大值的下标</span></span><br><span class="line">    <span class="function"><span class="type">int</span> <span class="title">max</span><span class="params">()</span> <span class="type">const</span></span>&#123;</span><br><span class="line">        <span class="type">int</span> max_value = head-&gt;value, i = <span class="number">1</span>, max_index = <span class="number">1</span>;</span><br><span class="line">        <span class="keyword">auto</span>* node = head;</span><br><span class="line">        <span class="keyword">while</span> (node != <span class="literal">nullptr</span>) &#123;</span><br><span class="line">            <span class="keyword">if</span> (node-&gt;value &gt; max_value) &#123;</span><br><span class="line">                max_value = node-&gt;value;</span><br><span class="line">                max_index = i;</span><br><span class="line">            &#125;</span><br><span class="line">            ++ i;</span><br><span class="line">            node = node-&gt;next;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> max_index;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">// 迭代法原地反转链表</span></span><br><span class="line">    <span class="function"><span class="type">void</span> <span class="title">reverse</span><span class="params">()</span></span>&#123;</span><br><span class="line">        <span class="keyword">if</span> (head == <span class="literal">nullptr</span>) <span class="keyword">return</span>;</span><br><span class="line">        <span class="keyword">auto</span> node = head-&gt;next;</span><br><span class="line">        head-&gt;next = <span class="literal">nullptr</span>;</span><br><span class="line">        <span class="comment">/* 等价于ruby中的head, node, node.next = node, node.next, head while node</span></span><br><span class="line"><span class="comment">         * C++交换变量必须借助中间变量</span></span><br><span class="line"><span class="comment">         * 注意赋值的先后顺序</span></span><br><span class="line"><span class="comment">         */</span></span><br><span class="line">        <span class="keyword">while</span> (node != <span class="literal">nullptr</span>) &#123;    </span><br><span class="line">            <span class="keyword">auto</span> temp1 = node;</span><br><span class="line">            <span class="keyword">auto</span> temp2 = node-&gt;next;</span><br><span class="line">            <span class="keyword">auto</span> temp3 = head;</span><br><span class="line">            head = temp1;</span><br><span class="line">            node-&gt;next = temp3;</span><br><span class="line">            node = temp2;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">// 查找链表中给定值的位置</span></span><br><span class="line">    <span class="function">ListNode&lt;T&gt;* <span class="title">find</span><span class="params">(T x)</span></span>&#123;</span><br><span class="line">        <span class="keyword">auto</span> node = head;</span><br><span class="line">        <span class="keyword">while</span> (node != <span class="literal">nullptr</span>) &#123;</span><br><span class="line">            <span class="keyword">if</span> (node-&gt;value == x) <span class="keyword">return</span> node;</span><br><span class="line">            node = node-&gt;next;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> <span class="literal">nullptr</span>;  <span class="comment">// 未找到给定值，返回空指针</span></span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure>
