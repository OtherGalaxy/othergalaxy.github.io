n class="line">184</span><br><span class="line">185</span><br><span class="line">186</span><br><span class="line">187</span><br><span class="line">188</span><br><span class="line">189</span><br><span class="line">190</span><br><span class="line">191</span><br><span class="line">192</span><br><span class="line">193</span><br><span class="line">194</span><br><span class="line">195</span><br><span class="line">196</span><br><span class="line">197</span><br><span class="line">198</span><br><span class="line">199</span><br><span class="line">200</span><br><span class="line">201</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">template</span>&lt;<span class="keyword">class</span> <span class="title class_">T</span>&gt;</span><br><span class="line"><span class="keyword">class</span> <span class="title class_">ListNode</span>&#123;</span><br><span class="line"><span class="keyword">public</span>:</span><br><span class="line">    T value&#123;&#125;;</span><br><span class="line">    ListNode* next = <span class="literal">nullptr</span>;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="keyword">template</span>&lt;<span class="keyword">class</span> <span class="title class_">T</span>&gt;</span><br><span class="line"><span class="keyword">class</span> <span class="title class_">List</span>&#123;</span><br><span class="line"><span class="keyword">public</span>:</span><br><span class="line">    ListNode&lt;T&gt;* head;</span><br><span class="line">    ListNode&lt;T&gt;* tail;</span><br><span class="line">    <span class="type">int</span> size = <span class="number">0</span>;</span><br><span class="line">    <span class="comment">// insert at the end</span></span><br><span class="line">    <span class="function"><span class="type">void</span> <span class="title">push_back</span><span class="params">(T value)</span></span>&#123;</span><br><span class="line">        <span class="keyword">auto</span>* node = <span class="keyword">new</span> ListNode&lt;T&gt;;</span><br><span class="line">        node-&gt;value = value;</span><br><span class="line">        <span class="keyword">if</span> (size == <span class="number">0</span>)&#123;</span><br><span class="line">            head = node;</span><br><span class="line">            tail = node;</span><br><span class="line">        &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">            tail-&gt;next = node;</span><br><span class="line">            tail = node;</span><br><span class="line">        &#125;</span><br><span class="line">        size++;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">// initialize by an initializer list</span></span><br><span class="line">    <span class="built_in">List</span>(std::initializer_list&lt;T&gt; list)&#123;</span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">auto</span> i : list)&#123;</span><br><span class="line">            <span class="built_in">push_back</span>(i);</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">// insert a node at the position</span></span><br><span class="line">    <span class="function"><span class="type">void</span> <span class="title">insert</span><span class="params">(ListNode&lt;T&gt;* node, <span class="type">int</span> position)</span></span>&#123;</span><br><span class="line">        <span class="keyword">if</span>(position == <span class="number">0</span>)&#123;</span><br><span class="line">            node-&gt;next = head;</span><br><span class="line">            head = node;</span><br><span class="line">        &#125;<span class="keyword">else</span>&#123;</span><br><span class="line">            ListNode&lt;T&gt;* temp = head;</span><br><span class="line">            <span class="keyword">for</span>(<span class="type">int</span
